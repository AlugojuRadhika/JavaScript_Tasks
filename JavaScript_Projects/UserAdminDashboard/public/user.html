        body{
    background:#f5f5f5;
    padding:30px;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

#container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.item{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 8px 15px rgba(0,0,0,.15);
    transition:.4s;
}

.item:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 25px rgba(0,0,0,.3);
}

.item img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin:15px 0;
}

.item h2{
    color:#222;
    margin-bottom:10px;
}

.item p{
    margin:8px 0;
    color:#555;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

.stock{
    color:royalblue;
    font-weight:bold;
}

.buy{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    background:#ff5722;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.buy:hover{
    background:#d84315;
}
