        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#dfe9f3,#ffffff);
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form{
    width:100%;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    margin-bottom:30px;
}

.form input{
    width:220px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

.form input:focus{
    border:1px solid royalblue;
    box-shadow:0 0 8px royalblue;
}

#saved{
    padding:10px 20px;
    background:royalblue;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

#saved:hover{
    background:#0d47a1;
}

#container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.item{
    background:white;
    border-radius:15px;
    padding:18px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    transition:.4s;
}

.item:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 25px rgba(0,0,0,.3);
}

.item img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin:15px 0;
}

.item p{
    margin:8px 0;
    color:#444;
    font-weight:500;
}

.item button{
    padding:10px 15px;
    margin:10px 5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    transition:.3s;
}

.item button:first-of-type{
    background:#e53935;
}

.item button:first-of-type:hover{
    background:#b71c1c;
}

.item button:last-of-type{
    background:#43a047;
}

.item button:last-of-type:hover{
    background:#1b5e20;
}
    </style>

<body>
    <div>
        <h1>🛒 Admin Dashboard</h1>
        <div class="form">
    <input type="hidden" id="id">
    <input type="text" placeholder="Enter Item Name" id="item">
    <input type="text" placeholder="Enter Image Link" id="image">
    <input type="text" placeholder="Enter Price Here" id="price">
    <input type="text" placeholder="Enter stock available or not" id="stockAvailable">
    <button id="saved" onclick="savedbtn()">Saved</button>
    </div>
    <div id="container"></div>

</div>
