<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 class="h1">Currency Converter</h1>
    <div id="container">
        <label for="input1" >Enter Amount :</label>
        <input type="number" name="input1" id="input1" placeholder="Enter Amount" style="height:23px; width:35%; border-radius: 8px;">
        <br>
        <label for="input2" >From Currency Type :</label>
        <select name="input2" id="input2" style="height:25px; width:35%; border-radius: 8px;">
            <option value="select" hidden>-----Select-----</option>
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select><br>
        <label for="input2" >To Currency Type :</label>
        <select name="input3" id="input3" style="height:25px; width:35%; border-radius: 8px;">
            <option value="select" hidden>-----Select-----</option>
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select><br>
        <button id="convert" onclick="converter()" style="height:30px; width:100%; border-radius: 8px;">Convert</button>
        <h2 id="res"></h2>
    </div>
    <script src="./script.js"></script>
</body>
</html>
