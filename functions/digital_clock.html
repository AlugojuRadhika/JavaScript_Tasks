<!-- digital clock -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        .one,.two{
            display: flex;
            justify-content: center;
            background-color: rgb(123, 126, 126);
            gap:5px;
            color: white ;
        }
        .two *{
            margin:0;
        }
    </style>
</head>

<body>
    <div class="one">
        <h1 id="hours"></h1>
        <h1>:</h1>
        <h1 id="minutes"></h1>
        <h1>:</h1>
        <h1 id="seconds"></h1>
    </div>
    <div class="two">
        <h2 id="date"></h2>
        <h2>/</h2>
        <h2 id="month"></h2>
        <h2>/</h2>
        <h2 id="year"></h2>
    </div>
    <!-- <h3 id="day"></h3> -->
    <script src="./digital_clock.js"></script>
</body>

</html>
